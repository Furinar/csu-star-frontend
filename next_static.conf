# 部署csustar.wiki目录下的Next.js静态站点
server {
    listen 80;
    listen [::]:80;
    # 填写你的服务器公网IP（有域名的话填域名）
    server_name csustar.wiki;

    # 核心修改：指向已存在的csustar.wiki目录
    root /var/www/html/csustar.wiki;
    index index.html index.htm;

    # 解决Next.js路由刷新404的关键配置
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 处理404页面（适配Next.js的_not-found/404页面）
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # 优化静态资源缓存（加快访问速度）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}